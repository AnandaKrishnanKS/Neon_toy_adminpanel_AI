<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToTToys Admin | Secure Access</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }
    
    .login-bg-decor {
      position: absolute;
      font-size: 6rem;
      user-select: none;
      pointer-events: none;
      opacity: 0.05;
      animation: floatDecor 6s ease-in-out infinite alternate;
    }

    .decor-1 { top: 15%; left: 15%; animation-delay: 0s; }
    .decor-2 { bottom: 15%; right: 15%; animation-delay: 2s; }
    .decor-3 { top: 20%; right: 20%; animation-delay: 4s; }

    @keyframes floatDecor {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-20px) rotate(15deg); }
    }

    .login-card {
      background: rgba(25, 28, 41, 0.65);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 50px 40px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 210, 255, 0.05);
      z-index: 10;
      animation: loginCardFade 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--accent-pink), var(--accent-cyan));
    }

    @keyframes loginCardFade {
      from { opacity: 0; transform: scale(0.95) translateY(15px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 12px;
      display: inline-block;
      animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); text-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
      100% { transform: scale(1); }
    }

    .login-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-header h1 span {
      background: linear-gradient(to right, var(--accent-pink), var(--accent-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .login-error-box {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.3);
      color: #ffaabb;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.88rem;
      margin-bottom: 25px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: shakeError 0.4s ease;
    }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(45deg, var(--accent-pink), var(--accent-cyan));
      color: var(--text-primary);
      border: none;
      padding: 14px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 51, 102, 0.25);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 25px rgba(0, 210, 255, 0.35);
    }

    .login-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Floating Toy Decors -->
    <div class="login-bg-decor decor-1">🧸</div>
    <div class="login-bg-decor decor-2">🚀</div>
    <div class="login-bg-decor decor-3">✨</div>

    <!-- Login Form Card -->
    <div class="login-card">
      <div class="login-header">
        <span class="login-logo">🔒</span>
        <h1>ToTToys <span>Console</span></h1>
        <p>Enter administrator credentials to access dashboard</p>
      </div>

      <!-- Alert Box -->
      <div class="login-error-box" id="error-alert">
        <span>⚠️</span>
        <span id="error-text">Invalid admin credentials</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" class="form-control" placeholder="e.g. admin">
        </div>
        <div class="form-group" style="margin-bottom: 25px;">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" class="form-control" placeholder="••••••••">
        </div>
        <button type="submit" class="login-btn" id="login-submit-btn">Verify Access</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('login-submit-btn');
      const errorBox = document.getElementById('error-alert');
      const errorText = document.getElementById('error-text');

      // Update button state
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying Credentials...';
      errorBox.style.display = 'none';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Redirect to root dashboard
          window.location.href = '/';
        } else {
          // Display error
          errorText.textContent = data.error || 'Access denied';
          errorBox.style.display = 'flex';
          
          // Re-trigger shake animation
          errorBox.style.animation = 'none';
          errorBox.offsetHeight; /* trigger reflow */
          errorBox.style.animation = null; 
        }
      } catch (err) {
        errorText.textContent = 'Failed to connect to the authentication server.';
        errorBox.style.display = 'flex';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Verify Access';
      }
    });
  </script>
</body>
</html>
